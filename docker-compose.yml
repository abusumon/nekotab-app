# Docker-compose is a way to run multiple containers at once and connect them
# This sets up and runs postgres and the django dev server as services
# Reference: https://docs.docker.com/compose/compose-file/

# Initial setup with
# $ docker-compose -f docker-compose.yml up

# Can run management commands with
# $ docker-compose run web /code/manage.py whatever

version: '3'

services:
  db:
    image: postgres:12
    environment:
      - POSTGRES_PASSWORD=NekoTab
      - POSTGRES_USER=NekoTab
      - POSTGRES_DB=NekoTab
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    volumes:
     - redis_data:/data

  web:
    build: .
    # Hack to wait until Postgres is up before running things
    command: ["./bin/docker-wait.sh", "--timeout=0", "db:5432", "--", "./bin/docker-run-honcho.sh"]
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    environment:
      - DEBUG=1
      - IN_DOCKER=1
      - DISABLE_SENTRY=1
      - DOCKER_REDIS=1
      - USING_NGINX=1
    ports:
      - "8000:8000"
    working_dir: /tcd

  worker:
    build: .
    # Hack to wait until migration is done before running things
    command: ["./bin/docker-wait.sh", "--timeout=0", "web:8000", "--", "./bin/docker-run-worker.sh"]
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=1
      - IN_DOCKER=1
      - DISABLE_SENTRY=1
      - DOCKER_REDIS=1
      - USING_NGINX=1
    working_dir: /tcd

  # --- nekospeech: Individual Speech Events FastAPI service ---
  nekospeech:
    build:
      context: ./nekospeech
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      - NEKOSPEECH_DATABASE_URL=postgresql+asyncpg://NekoTab:NekoTab@db:5432/NekoTab
      - NEKOSPEECH_REDIS_URL=redis://redis:6379/2
      - NEKOSPEECH_CELERY_BROKER_URL=redis://redis:6379/3
      - NEKOSPEECH_DEBUG=1
      - DJANGO_SECRET_KEY=insecure-dev-key-for-docker-compose-only
    ports:
      - "8001:8001"

  nekospeech-worker:
    build:
      context: ./nekospeech
      dockerfile: Dockerfile
    command: ["celery", "-A", "nekospeech.workers.tasks", "worker", "--loglevel=info"]
    depends_on:
      - db
      - redis
    environment:
      - NEKOSPEECH_DATABASE_URL=postgresql+asyncpg://NekoTab:NekoTab@db:5432/NekoTab
      - NEKOSPEECH_REDIS_URL=redis://redis:6379/2
      - NEKOSPEECH_CELERY_BROKER_URL=redis://redis:6379/3
      - DJANGO_SECRET_KEY=insecure-dev-key-for-docker-compose-only

  # --- nekocongress: Congressional Debate FastAPI service ---
  nekocongress:
    build:
      context: ./nekocongress
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      - NEKOCONGRESS_DATABASE_URL=postgresql+asyncpg://NekoTab:NekoTab@db:5432/NekoTab
      - NEKOCONGRESS_REDIS_URL=redis://redis:6379/4
      - NEKOCONGRESS_CELERY_BROKER_URL=redis://redis:6379/5
      - NEKOCONGRESS_DEBUG=1
      - DJANGO_SECRET_KEY=insecure-dev-key-for-docker-compose-only
    ports:
      - "8002:8002"

  nginx:
    image: nginx:1.25
    depends_on:
      - web
      - nekospeech
      - nekocongress
    ports:
      - "80:80"
    volumes:
      - ./config/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  node_modules:
  redis_data:
