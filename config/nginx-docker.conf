# Nginx reverse proxy for Docker development.
# Routes /api/ie/* to the nekospeech FastAPI service; everything else to Django.

upstream django {
    server web:8000;
}

upstream nekospeech {
    server nekospeech:8001;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # --- Individual Speech Events API → nekospeech FastAPI ---
    location /api/ie/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;

        # WebSocket support for /api/ie/ws/
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://nekospeech;
    }

    # --- Static files ---
    location /static/ {
        alias /tcd/tabbycat/staticfiles/;
        access_log off;
        add_header Cache-Control "public";
        expires 7d;
    }

    # --- Django WebSocket ---
    location /ws/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;
        proxy_buffering  off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://django;
    }

    # --- Everything else → Django ---
    location / {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
        proxy_pass       http://django;
    }
}
