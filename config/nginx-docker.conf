# Nginx reverse proxy for Docker development.
# Routes /api/ie/* to the nekospeech FastAPI service; everything else to Django.

upstream django {
    server web:8000;
}

upstream nekospeech {
    server nekospeech:8001;
}

upstream nekocongress {
    server nekocongress:8002;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # --- Individual Speech Events API → nekospeech FastAPI ---
    location /api/ie/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;

        # WebSocket support for /api/ie/ws/
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://nekospeech;
    }

    # --- Congressional Debate API → nekocongress FastAPI ---
    location /api/congress/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;

        # WebSocket support for /api/congress/ws/
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://nekocongress;
    }

    # --- Static files ---
    location /static/ {
        alias /tcd/tabbycat/staticfiles/;
        access_log off;
        add_header Cache-Control "public";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.googleadservices.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.nekotab.app wss://*.nekotab.app https://www.google-analytics.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googleadservices.com; frame-src 'self' https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://pagead2.googlesyndication.com; frame-ancestors 'none';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        expires 7d;
    }

    # --- Django WebSocket ---
    location /ws/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;
        proxy_buffering  off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://django;
    }

    # --- Everything else → Django ---
    location / {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
        proxy_pass       http://django;
    }
}
