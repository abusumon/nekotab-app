import os

# gunicorn-do.conf — DigitalOcean production
#
# Key differences vs gunicorn.conf:
#   • bind = 0.0.0.0:8000 (TCP) instead of unix socket so the nginx container
#     can reach Django over Docker's internal network (service name: web).
#   • Default WEB_CONCURRENCY starts at 2 (conservative for 4 GiB Droplet).
#     Tune upward after measuring memory headroom in production:
#       - 2 workers ≈ 600-800 MiB RSS (safe floor for 4 GiB)
#       - 3 workers ≈ 900-1200 MiB (add once staging confirms headroom)
#       - 4 workers ≈ 1200-1600 MiB (only if no OOM kills at 3)
#     Set WEB_CONCURRENCY in .env.production to override without a redeploy.
#   • max_requests_jitter staggers restarts so they don't all hit at once.

def when_ready(server):
    print(f'gunicorn: {WORKERS} UvicornWorker(s) on 0.0.0.0:8000')
    open('/tmp/app-initialized', 'w').close()


if os.environ.get('WEB_CONCURRENCY'):
    WORKERS = int(os.environ['WEB_CONCURRENCY'])
else:
    WORKERS = 2

chdir          = './tabbycat/'
bind           = '0.0.0.0:8000'
workers        = WORKERS
worker_class   = 'uvicorn.workers.UvicornWorker'
max_requests   = 250   # Restart workers periodically to limit memory leaks
max_requests_jitter = 25  # Spread restarts to avoid all workers cycling at once
