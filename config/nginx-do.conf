# nginx-do.conf — DigitalOcean production
#
# TLS is terminated at the DO Load Balancer.  Nginx handles HTTP routing
# between the containerised services and serves the /health/ probe for the LB.
#
# Static files are served by WhiteNoise (already wired in Django middleware)
# so no cross-container volume share is needed here.
#
# Upstream service hostnames match the docker-compose.do.yml service names.

upstream django {
    server web:8000;
    keepalive 32;
}

upstream nekospeech {
    server nekospeech:8001;
    keepalive 8;
}

upstream nekocongress {
    server nekocongress:8002;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Pass the Load Balancer's X-Forwarded-Proto header through to Django
    # so request.is_secure() works correctly without HTTPS at the Droplet level.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ------------------------------------------------------------------
    # DO Load Balancer / internal health probe — answered by nginx itself
    # so the check is fast and independent of Django being fully up.
    # ------------------------------------------------------------------
    location = /health/ {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # Individual Speech Events API → nekospeech FastAPI
    # nginx proxies /api/ie/ to the nekospeech container on port 8001.
    # ------------------------------------------------------------------
    location /api/ie/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://nekospeech;
    }

    # ------------------------------------------------------------------
    # Congressional Debate API → nekocongress FastAPI
    # nginx proxies /api/congress/ to the nekocongress container on 8002.
    # ------------------------------------------------------------------
    location /api/congress/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://nekocongress;
    }

    # ------------------------------------------------------------------
    # Django WebSocket (/ws/) — long-lived connections for real-time updates
    # ------------------------------------------------------------------
    location /ws/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;
        proxy_buffering  off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass http://django;
    }

    # ------------------------------------------------------------------
    # All other traffic → Django ASGI (includes /static/ via WhiteNoise)
    # ------------------------------------------------------------------
    location / {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        # Enable HTTP/1.1 keep-alive to reduce connection overhead
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_pass http://django;
    }

    # ------------------------------------------------------------------
    # Security hardening
    # ------------------------------------------------------------------
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;
}
