# nginx-do.conf - DigitalOcean production
#
# TLS is terminated directly on this Droplet.
# Nginx handles:
# - HTTP -> HTTPS redirects
# - ACME HTTP-01 challenge responses for Let's Encrypt
# - reverse-proxy routing to containerized services

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    # Internal health probe used by docker-compose healthcheck.
    location = /health/ {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # HTTP-01 challenge path for cert issuance/renewal.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    # Public landing page on apex root.
    location = / {
        return 301 https://nekotab.app/;
    }

    # Canonical host redirect.
    if ($host = www.nekotab.app) {
        return 301 https://nekotab.app$request_uri;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;
}

server {
    listen 443 ssl;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    ssl_certificate /etc/letsencrypt/live/nekotab.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nekotab.app/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Required by Django security settings (SECURE_PROXY_SSL_HEADER).
    proxy_set_header X-Forwarded-Proto https;

    # Canonical host redirect.
    if ($host = www.nekotab.app) {
        return 301 https://nekotab.app$request_uri;
    }

    # Public landing page on apex root.
    location = / {
        set $django_root_upstream http://web:8000/;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_pass $django_root_upstream;
    }

    # Internal health probe (kept for consistency).
    location = /health/ {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Individual Events API -> nekospeech FastAPI.
    location /api/ie/ {
        set $nekospeech_upstream http://nekospeech:8001;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass $nekospeech_upstream;
    }

    # Congressional Debate API -> nekocongress FastAPI.
    location /api/congress/ {
        set $nekocongress_upstream http://nekocongress:8002;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass $nekocongress_upstream;
    }

    # Django WebSocket (/ws/) - long-lived connections.
    location /ws/ {
        set $django_upstream http://web:8000;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;
        proxy_buffering  off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1800s;

        proxy_pass $django_upstream;
    }

    # All other traffic -> Django ASGI (includes /static/ via WhiteNoise).
    location / {
        set $django_upstream http://web:8000;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_redirect   off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_pass $django_upstream;
    }

    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;
}
