name: Deploy to DigitalOcean

# Builds three Docker images (main app, nekospeech, nekocongress), pushes them
# to the DO Container Registry, then SSHes into the production Droplet and
# performs a rolling restart with zero-downtime start-first ordering.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DO_API_TOKEN        — DO personal access token with registry:read+write
#   DO_REGISTRY_NAME    — Registry name only, e.g.  nekotab-registry
#   DO_DROPLET_IP       — Public IP of the production Droplet
#   DO_SSH_PRIVATE_KEY_B64 — Base64-encoded private key matching the deploy SSH key on the Droplet

on:
  push:
    branches: [main]
  workflow_dispatch: {}    # Allow manual deploys from the Actions tab

env:
  DO_REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build and push all three Docker images to DO Container Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Authenticate with DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      # Build main app image (Python + Node + collectstatic — heavy, cached by
      # Docker layer caching across runs via the cache-from/to flags)
      - name: Build main app image
        run: |
          docker build \
            --progress=plain \
            --cache-from $DO_REGISTRY/nekotab:latest \
            -t $DO_REGISTRY/nekotab:$IMAGE_TAG \
            -t $DO_REGISTRY/nekotab:latest \
            .

      - name: Build nekospeech image
        run: |
          docker build \
            --progress=plain \
            --cache-from $DO_REGISTRY/nekotab-nekospeech:latest \
            -t $DO_REGISTRY/nekotab-nekospeech:$IMAGE_TAG \
            -t $DO_REGISTRY/nekotab-nekospeech:latest \
            ./nekospeech

      - name: Build nekocongress image
        run: |
          docker build \
            --progress=plain \
            --cache-from $DO_REGISTRY/nekotab-nekocongress:latest \
            -t $DO_REGISTRY/nekotab-nekocongress:$IMAGE_TAG \
            -t $DO_REGISTRY/nekotab-nekocongress:latest \
            ./nekocongress

      - name: Push all images
        run: |
          docker push $DO_REGISTRY/nekotab:$IMAGE_TAG
          docker push $DO_REGISTRY/nekotab:latest
          docker push $DO_REGISTRY/nekotab-nekospeech:$IMAGE_TAG
          docker push $DO_REGISTRY/nekotab-nekospeech:latest
          docker push $DO_REGISTRY/nekotab-nekocongress:$IMAGE_TAG
          docker push $DO_REGISTRY/nekotab-nekocongress:latest

  # ---------------------------------------------------------------------------
  # Job 2 — Deploy to the production Droplet
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (needed to scp config files)
        uses: actions/checkout@v4

      - name: Prepare deploy SSH key
        env:
          DO_SSH_PRIVATE_KEY_B64: ${{ secrets.DO_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -eu
          python3 - <<'PY'
          import base64
          import binascii
          import os
          import pathlib

          raw_b64 = os.environ.get("DO_SSH_PRIVATE_KEY_B64", "").strip()

          if not raw_b64:
            raise SystemExit("Missing DO_SSH_PRIVATE_KEY_B64 secret.")

          try:
            normalized = base64.b64decode(raw_b64).decode("utf-8")
          except (binascii.Error, UnicodeDecodeError) as exc:
            raise SystemExit(f"Invalid DO_SSH_PRIVATE_KEY_B64 secret: {exc}")

          normalized = normalized.replace("\r\n", "\n").replace("\r", "\n").strip() + "\n"

          ssh_dir = pathlib.Path.home() / ".ssh"
          ssh_dir.mkdir(mode=0o700, exist_ok=True)

          key_file = ssh_dir / "do_deploy_key"
          key_file.write_text(normalized, encoding="utf-8")
          os.chmod(key_file, 0o600)
          print(f"Wrote key to {key_file}")

          # Export normalized key content for use in action containers
          # (action containers cannot access runner ~/.ssh via key_path)
          gh_env = os.environ.get("GITHUB_ENV", "")
          if gh_env:
            with open(gh_env, "a", encoding="utf-8") as f:
              f.write("DEPLOY_KEY<<EOF_DEPLOY_KEY\n")
              f.write(normalized)
              f.write("EOF_DEPLOY_KEY\n")
          PY

          # Fail fast with a clear error if the key content is still invalid.
          ssh-keygen -y -f ~/.ssh/do_deploy_key >/dev/null
          ssh-keygen -lf ~/.ssh/do_deploy_key

      - name: Normalise line endings in config files (strip CRLF)
        run: |
          sed -i 's/\r//' docker-compose.do.yml
          sed -i 's/\r//' config/nginx-do.conf
          sed -i 's/\r//' config/gunicorn-do.conf
          sed -i 's/\r//' bin/do-web-start.sh

      - name: Copy updated config files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: nekotab
          key: ${{ env.DEPLOY_KEY }}
          source: "docker-compose.do.yml,config/nginx-do.conf,config/gunicorn-do.conf,bin/do-web-start.sh"
          target: "/opt/nekotab"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DO_REGISTRY: ${{ env.DO_REGISTRY }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: nekotab
          key: ${{ env.DEPLOY_KEY }}
          envs: DO_REGISTRY,DO_API_TOKEN,IMAGE_TAG
          script: |
            set -e
            cd /opt/nekotab

            echo "==> Authenticating with DO Container Registry..."
            echo "$DO_API_TOKEN" | docker login registry.digitalocean.com \
              --username unused --password-stdin

            echo "==> Pulling new images (tag: $IMAGE_TAG)..."
            export IMAGE_TAG="$IMAGE_TAG"
            export DO_REGISTRY_URL="$DO_REGISTRY"
            docker compose -f docker-compose.do.yml pull

            echo "==> Ensuring db and redis are running (no-op if already healthy)..."
            docker compose -f docker-compose.do.yml up -d db redis

            echo "==> Waiting for db to be healthy..."
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.do.yml exec -T db pg_isready -U nekotab >/dev/null 2>&1; then
                echo "    db is ready"
                break
              fi
              echo "    waiting for db... $i/12"
              sleep 5
            done

            echo "==> Running database migrations (pre-start, so gunicorn starts fast)..."
            docker compose -f docker-compose.do.yml run --rm --no-deps \
              -e PYTHONPATH=/tcd \
              web python tabbycat/manage.py migrate --noinput

            echo "==> Restarting app services with new images..."
            docker compose -f docker-compose.do.yml up -d \
              --remove-orphans \
              --no-deps \
              web worker nekospeech nekospeech-worker nekocongress nginx || {
              echo "ERROR: docker compose up failed. Web container logs:"
              docker compose -f docker-compose.do.yml logs --tail=200 web || true
              exit 1
            }

            echo "==> Initial web container logs (startup output):"
            sleep 5
            docker compose -f docker-compose.do.yml logs --tail=50 web || true

            echo "==> Waiting for web service to become healthy..."
            WEB_HEALTHY=0
            for i in $(seq 1 24); do
              STATUS=$(docker compose -f docker-compose.do.yml ps --format json web 2>/dev/null | python3 -c "import sys,json; line=sys.stdin.readline().strip(); print(json.loads(line).get('Health','unknown') if line else 'unknown')" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "    web is healthy after $((i * 5))s"
                WEB_HEALTHY=1
                break
              fi
              echo "    waiting... ($STATUS) ${i}/24"
              sleep 5
            done

            if [ "$WEB_HEALTHY" -ne 1 ]; then
              echo "ERROR: web container did not become healthy in time. Last status: $STATUS"
              echo "==> web container logs (last 200 lines):"
              docker compose -f docker-compose.do.yml logs --tail=200 web || true
              exit 1
            fi

            echo "==> Pruning old images (>24h)..."
            docker image prune -f --filter "until=24h"

            echo "==> Deploy complete (commit: $IMAGE_TAG)"
